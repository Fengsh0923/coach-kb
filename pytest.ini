[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra -q --strict-markers
markers =
    integration: HTTP 端到端集成测试（用 FastAPI TestClient）
    unit: 单元测试（mock 外部依赖）
    slow: 耗时测试
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning:starlette.*
    ignore::DeprecationWarning:pydantic.*
