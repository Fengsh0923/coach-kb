<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>对话回放评估 · Coach KB</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #fafaf7; color: #1a1a1a; line-height: 1.75; min-height: 100vh; }
.layout { max-width: 880px; margin: 0 auto; padding: 30px 24px 80px; }
.crumb { font-size: 0.88rem; color: #888; margin-bottom: 14px; }
.crumb a { color: #c2410c; text-decoration: none; }
.crumb a:hover { text-decoration: underline; }
h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; }
.lead { color: #666; margin-bottom: 18px; font-size: 0.96rem; }
.privacy { background: #fef7e0; border: 1px solid #fed7aa; padding: 12px 16px; border-radius: 6px; margin-bottom: 22px; font-size: 0.88rem; color: #92400e; }
.privacy label { cursor: pointer; user-select: none; }
.privacy input { margin-right: 6px; vertical-align: -2px; }
.input-area { background: white; border: 1.5px solid #d4d4d0; border-radius: 8px; padding: 14px 16px; margin-bottom: 14px; }
.input-area:focus-within { border-color: #c2410c; }
textarea { width: 100%; min-height: 240px; border: none; outline: none; font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, monospace; font-size: 0.92rem; resize: vertical; line-height: 1.7; background: transparent; color: #333; }
.input-foot { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid #f0eee8; margin-top: 8px; color: #999; font-size: 0.82rem; }
.btn { padding: 8px 18px; background: #c2410c; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 0.95rem; font-family: inherit; }
.btn:hover { background: #9a3412; }
.btn:disabled { background: #ccc; cursor: not-allowed; }
.examples { color: #888; font-size: 0.85rem; margin-bottom: 20px; }
.examples a { color: #c2410c; cursor: pointer; margin-right: 14px; }
.examples a:hover { text-decoration: underline; }
.status { font-size: 0.9rem; color: #888; margin: 10px 0; }
.status.error { color: #b91c1c; }
.result { margin-top: 30px; }
.overall { background: white; padding: 22px 24px; border: 1px solid #e5e5e0; border-radius: 8px; margin-bottom: 18px; }
.overall .level { display: inline-block; padding: 4px 12px; border-radius: 4px; font-weight: 700; font-size: 1rem; }
.level.ACC { background: #fee2e2; color: #991b1b; }
.level.borderline_PCC { background: #fef3c7; color: #92400e; }
.level.PCC { background: #dcfce7; color: #166534; }
.level.MCC { background: #dbeafe; color: #1e40af; }
.overall .summary { margin-top: 12px; color: #444; }
.scores-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 18px 0; }
.score-card { background: white; padding: 14px; border: 1px solid #e5e5e0; border-radius: 6px; text-align: center; }
.score-card .num { font-size: 0.78rem; color: #c2410c; font-weight: 600; }
.score-card .zh { font-size: 0.9rem; margin: 6px 0; color: #333; }
.score-card .badge { display: inline-block; padding: 2px 10px; border-radius: 3px; font-size: 0.78rem; font-weight: 600; }
.badge.ACC { background: #fef3c7; color: #92400e; }
.badge.PCC { background: #dcfce7; color: #166534; }
.badge.MCC { background: #dbeafe; color: #1e40af; }
.badge.未观察到 { background: #f3f4f6; color: #6b7280; }
h2 { font-size: 1.2rem; margin: 24px 0 12px; padding-bottom: 6px; border-bottom: 1px solid #e5e5e0; }
.card { background: white; padding: 14px 18px; border: 1px solid #e5e5e0; border-radius: 6px; margin-bottom: 10px; }
.card .cid { display: inline-block; padding: 2px 8px; background: #fff3e8; color: #c2410c; border-radius: 3px; font-size: 0.78rem; font-weight: 600; margin-right: 8px; }
.card blockquote { border-left: 3px solid #c2410c; padding-left: 12px; margin: 8px 0; color: #555; font-size: 0.92rem; }
.card .text { color: #444; font-size: 0.95rem; }
.card .ex { margin-top: 8px; padding: 8px 12px; background: #f8f5ef; border-radius: 4px; color: #4b5563; font-size: 0.88rem; font-style: italic; }
@media (max-width: 700px) { .scores-grid { grid-template-columns: repeat(2, 1fr); } h1 { font-size: 1.5rem; } }
</style>
</head>
<body>
<div class="layout">
  <div class="crumb"><a href="/">首页</a> / 对话回放评估</div>
  <h1>对话回放评估</h1>
  <p class="lead">粘贴一段教练对话转录，AI 按 ICF 8 项核心能力打分（ACC/PCC/MCC）+ 给出关键时刻引用 + 具体改进建议。</p>

  <div class="privacy">
    <label><input type="checkbox" id="consent"> 我同意：此对话文本将存入匿名 session（不含 IP/账号），用于改进评估质量。<strong>录音不要上传，文字录入即可。</strong></label>
  </div>

  <div class="input-area">
    <textarea id="transcript" placeholder="格式（示例）：&#10;教练：今天想聊什么？&#10;客户：我最近压力很大……&#10;教练：……" autofocus></textarea>
    <div class="input-foot">
      <span>建议 5-10 分钟对话 / 500-3000 字</span>
      <button class="btn" id="submit" onclick="run()">开始评估</button>
    </div>
  </div>

  <div class="examples">
    试试：
    <a onclick="loadExample(1)">范例 1：客户提及自杀念头，教练未处理</a>
    <a onclick="loadExample(2)">范例 2：教练做了有效"唤起觉察"</a>
  </div>

  <div id="status" class="status"></div>
  <div id="result" class="result"></div>
</div>

<script>
const COMP = [
  null,
  {zh:"展现伦理实践", cat:"Foundation"},
  {zh:"具备教练心态", cat:"Foundation"},
  {zh:"建立与维护契约", cat:"Co-Creating"},
  {zh:"培育信任与安全", cat:"Co-Creating"},
  {zh:"保持临在", cat:"Co-Creating"},
  {zh:"主动倾听", cat:"Communicating"},
  {zh:"唤起觉察", cat:"Communicating"},
  {zh:"促进客户成长", cat:"Cultivating"},
];

function loadExample(n) {
  const examples = {
    1: "客户：我最近真的撑不住了，已经连续两周每天只睡三四个小时，脑子里全是那些做不完的项目。有时候站在阳台上会想，如果直接跳下去是不是就不用面对了。\n教练：嗯我理解你压力很大。我们来看看你的时间管理可以怎么调整，也许能帮你减轻一些负担？\n客户：可是我真的不知道从哪里开始……\n教练：那我们先列个清单吧，把所有任务按优先级排序。",
    2: "客户：我一直觉得自己做得不够好，总想给老板留下"靠得住"的印象。\n教练：你刚才说"靠得住"——对你来说，"靠得住"这个标签具体是什么样子？\n客户：嗯……大概是不出错、什么都接得住、不让别人失望。\n教练：当你描述这个画面的时候，我注意到你的语气慢了下来——这里发生了什么？\n客户：（停顿）其实我有点累……总是不让别人失望，那"我自己"在哪里？\n教练：这是个值得停下来的觉察。如果"靠得住"是别人对你的期待，那你对自己的期待是什么？"
  };
  document.getElementById('transcript').value = examples[n] || '';
}

async function run() {
  const transcript = document.getElementById('transcript').value.trim();
  const consent = document.getElementById('consent').checked;
  const btn = document.getElementById('submit');
  const statusEl = document.getElementById('status');
  const resultEl = document.getElementById('result');

  if (!consent) { statusEl.textContent = '请先勾选「我同意」'; statusEl.classList.add('error'); return; }
  if (transcript.length < 50) { statusEl.textContent = '对话文本太短（≥ 50 字）'; statusEl.classList.add('error'); return; }

  btn.disabled = true; btn.textContent = '评估中…';
  statusEl.textContent = 'AI 正在分析（30-60 秒）…';
  statusEl.classList.remove('error');
  resultEl.innerHTML = '';

  try {
    const res = await fetch('/api/eval', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({transcript, consent: true})
    });
    const data = await res.json();
    if (data.error) {
      statusEl.textContent = '错误：' + data.error; statusEl.classList.add('error');
      if (data.raw) resultEl.innerHTML = '<pre style="font-size:0.8rem;color:#888;white-space:pre-wrap;">' + data.raw + '</pre>';
      return;
    }
    render(data);
    statusEl.textContent = '评估完成';
    setTimeout(() => statusEl.textContent = '', 2500);
  } catch(e) {
    statusEl.textContent = '请求失败：' + e.message; statusEl.classList.add('error');
  } finally {
    btn.disabled = false; btn.textContent = '开始评估';
  }
}

function render(d) {
  const r = document.getElementById('result');
  const overallCls = (d.overall_level || '').replace(/ /g, '_');
  let html = `<div class="overall">
    <div>综合判定：<span class="level ${overallCls}">${d.overall_level}</span></div>
    <div class="summary">${d.summary || ''}</div>
  </div>`;

  html += `<h2>8 项核心能力评分</h2><div class="scores-grid">`;
  for (let i = 1; i <= 8; i++) {
    const v = d.scores[i] || '?';
    const c = COMP[i];
    html += `<div class="score-card">
      <div class="num">第 ${i} 项</div>
      <div class="zh">${c.zh}</div>
      <div class="badge ${v}">${v}</div>
    </div>`;
  }
  html += `</div>`;

  if (d.highlights && d.highlights.length) {
    html += `<h2>关键时刻（${d.highlights.length}）</h2>`;
    for (const h of d.highlights) {
      html += `<div class="card">
        <span class="cid">第 ${h.competency_id} 项 · ${COMP[h.competency_id]?.zh || ''}</span>
        <blockquote>${escape_html(h.quote)}</blockquote>
        <div class="text">${escape_html(h.comment || '')}</div>
      </div>`;
    }
  }

  if (d.improvements && d.improvements.length) {
    html += `<h2>改进建议（${d.improvements.length}）</h2>`;
    for (const it of d.improvements) {
      html += `<div class="card">
        <span class="cid">第 ${it.competency_id} 项 · ${COMP[it.competency_id]?.zh || ''}</span>
        <div class="text">${escape_html(it.suggestion || '')}</div>
        ${it.example_phrasing ? `<div class="ex">💬 ${escape_html(it.example_phrasing)}</div>` : ''}
      </div>`;
    }
  }
  r.innerHTML = html;
}

function escape_html(s) {
  return (s || '').replace(/[<>&"]/g, m => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[m]));
}
</script>
</body>
</html>
